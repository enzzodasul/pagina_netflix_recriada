<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/favicon" href="imagens/netflixicone.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="style.css"/>
    <title>NETFLIX
    </title>

</head>
<body>
  
<div class="nav">
   <img class="nav__logo" src="imagens/netflix-logo.png" alt="logo netflix" />
   <img class="nav__logo" src="imagens/netflix-avatar.png" alt="logo avatar" />
</div>


<header class="banner">
    
    
    <div class="banner__contents">
        <h1 class="banner__title">La casa de Papel</h1>
        <div class="banner__buttons">
            <button class="banner__button">Assistir</button>
            <button class="banner__button">Minha Lista</button>
        </div>
        <h1 class="banner__description">
            oito ladroes se trancam com refens na casa da moeda da espanha. seu lider manipula a policia para realizar o plano que pode ser o maior roubo da estoria.
        </h1>
    </div>
    <div class="banner--fadeBottom"></div>
</header>
    

<div class="row">
    <h2>ORIGINAIS NETFLIX</h2>
    <div class="row__posters">

        <img class="row__poster row__Large" src="imagens/large-movie1.jpg" alt="" />
        <img class="row__poster row__Large" src="imagens/large-movie2.jpg" alt="" />
        <img class="row__poster row__Large" src="imagens/large-movie3.jpg" alt="" />
        <img class="row__poster row__Large" src="imagens/large-movie4.jpg" alt="" />
        <img class="row__poster row__Large" src="imagens/large-movie5.jpg" alt="" />
        <img class="row__poster row__Large" src="imagens/large-movie6.jpg" alt="" />
        <img class="row__poster row__Large" src="imagens/large-movie7.jpg" alt="" />
        <img class="row__poster row__Large" src="imagens/large-movie8.jpg" alt="" />

    </div>

</div>



<div class="row">

     <h2>Novidades</h2>
     <div class="row__posters">

        <img class="row__poster" src="imagens/small-movie1.jpg" alt="" />
        <img class="row__poster" src="imagens/small-movie2.jpg" alt="" />
        <img class="row__poster" src="imagens/small-movie3.jpg" alt="" />
        <img class="row__poster" src="imagens/small-movie4.jpg" alt="" />
        <img class="row__poster" src="imagens/small-movie5.jpg" alt="" />
        <img class="row__poster" src="imagens/small-movie6.jpg" alt="" />
        <img class="row__poster" src="imagens/small-movie7.jpg" alt="" />
        <img class="row__poster" src="imagens/small-movie8.jpg" alt="" />

     </div>

</div>



</body>
</html>
